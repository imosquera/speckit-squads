schema_version: "1.0"

preset:
  id: "spec-minimal"
  name: "Spec Minimal"
  version: "1.0.0"
  description: "Wraps /speckit-specify and /speckit-plan to trim generated artifacts without replacing the stock command flow. Specify still drops Assumptions, Key Entities, and Success Criteria and adds a GitHub-safe inline HTML preview for UI-touching features. Plan still trims the documentation tree and avoids data-model.md, quickstart.md, and contracts/ unless truly needed."
  author: "imosquera"
  repository: "https://github.com/imosquera/speckit-squads"
  license: "MIT"

requires:
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Composable wrapper for /speckit-specify that trims spec output and adds a GitHub-safe inline HTML UI preview when needed."
      strategy: "wrap"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Composable wrapper for /speckit-plan that trims the documentation tree produced by the stock command."
      strategy: "wrap"

tags:
  - "spec-minimal"
  - "minimal"
  - "artifacts"
