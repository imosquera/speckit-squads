# graphify extension config — copied into .specify/extensions/graphify/graphify-config.yml on install.
#
# scan_subpath: relative path within the worktree that graphify operates on.
#   "."           scan the whole worktree (default)
#   "src"         scan only src/ (skips vendor, build artifacts, generated code, etc.)
#   "packages"    monorepo: scan only packages/
#
# /speckit-graphify-init writes this file interactively on first run based on
# a scan of the worktree's top-level directories. Edit by hand to change scope.
scan_subpath: .
