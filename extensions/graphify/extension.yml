schema_version: "1.0"

extension:
  id: graphify
  name: "Graphify Knowledge Graph Updater"
  version: "1.2.0"
  description: "Build and refresh the repository's graphify-out/ knowledge graph. /speckit-graphify-init scans the worktree on first run and asks which subpath to scope graphify to (writes graphify-config.yml#scan_subpath); /speckit-graphify-update is hooked into after_specify/after_implement and runs `graphify update <worktree>/<scan_subpath>` non-blockingly."
  author: beadbits
  repository: local
  license: same-as-project

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: graphify
      required: false

provides:
  commands:
    - name: speckit.graphify.init
      file: commands/speckit.graphify.init.md
      description: "Build the initial graphify-out/ knowledge graph for the current feature worktree"
    - name: speckit.graphify.update
      file: commands/speckit.graphify.update.md
      description: "Run `graphify update <worktree-path>/<scan_subpath>` against the feature worktree; non-blocking"

  config:
    - name: "graphify-config.yml"
      template: "config-template.yml"
      description: "Graphify scope configuration — controls which worktree subpath graphify scans"
      required: false

hooks:
  after_specify:
    command: speckit.graphify.update
    optional: true
    prompt: "Refresh graphify-out/ knowledge graph?"
    description: "Refresh knowledge graph after specification"
  after_implement:
    command: speckit.graphify.update
    optional: false
    description: "Refresh knowledge graph after implementation"

tags:
  - graphify
  - knowledge-graph
  - constitution-viii
