schema_version: "1.0"

extension:
  id: graphify
  name: "Graphify Knowledge Graph Updater"
  version: "1.1.0"
  description: "Refresh the repository's graphify-out/ knowledge graph after Spec Kit phases by invoking /graphify <worktree-path> --update. Non-blocking: missing binary or missing graphify-out/ warns and exits 0. Implements BeadBits Constitution v2.4.0 Principle VIII (Knowledge Graph Freshness)."
  author: beadbits
  repository: local
  license: same-as-project

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: graphify
      required: false

provides:
  commands:
    - name: speckit.graphify.init
      file: commands/speckit.graphify.init.md
      description: "Build the initial graphify-out/ knowledge graph for the current feature worktree"
    - name: speckit.graphify.update
      file: commands/speckit.graphify.update.md
      description: "Run /graphify <worktree-path> --update against the feature worktree; non-blocking"

hooks:
  after_specify:
    command: speckit.graphify.update
    optional: true
    prompt: "Refresh graphify-out/ knowledge graph?"
    description: "Refresh knowledge graph after specification"
  after_implement:
    command: speckit.graphify.update
    optional: false
    description: "Refresh knowledge graph after implementation"

tags:
  - graphify
  - knowledge-graph
  - constitution-viii
