schema_version: "1.0"

extension:
  id: graphify
  name: "Graphify Knowledge Graph Updater"
  version: "1.3.0"
  description: "Build and refresh the repository's graphify-out/ knowledge graph at the worktree root. /speckit-graphify-init seeds .graphifyignore interactively on first run; /speckit-graphify-update is hooked into after_specify/after_implement and runs `graphify update <worktree>` non-blockingly. Both always scan from the worktree root — graphify writes graphify-out/ next to whatever path you give it, so scoping lives in .graphifyignore, not a Spec Kit config knob."
  author: beadbits
  repository: local
  license: same-as-project

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: graphify
      required: false

provides:
  commands:
    - name: speckit.graphify.init
      file: commands/speckit.graphify.init.md
      description: "Build the initial graphify-out/ knowledge graph for the current feature worktree"
    - name: speckit.graphify.update
      file: commands/speckit.graphify.update.md
      description: "Run `graphify update <worktree-path>` against the feature worktree; non-blocking"

hooks:
  after_specify:
    command: speckit.graphify.update
    optional: true
    prompt: "Refresh graphify-out/ knowledge graph?"
    description: "Refresh knowledge graph after specification"
  after_implement:
    command: speckit.graphify.update
    optional: false
    description: "Refresh knowledge graph after implementation"

tags:
  - graphify
  - knowledge-graph
  - constitution-viii
